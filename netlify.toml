[build]
  command = "npm run build"
  publish = "dist"

# Setup SPA redirect fallback so Netlify serves index.html for react routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# OPTIONAL: If you deploy the frontend on Netlify and the backend Express server on Render,
# you can easily proxy the API requests to Render by uncommenting and configuring below:
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-custom-backend.onrender.com/api/:splat"
#   status = 200
#   force = true
